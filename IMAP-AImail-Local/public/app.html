<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mail Extract</title>
<style>
:root{--bg:#0c0c0c;--s1:#141414;--s2:#1c1c1c;--s3:#252525;--b1:#333333;--b2:#444444;--b3:#555555;--t1:#ede8df;--t2:#b8b0a8;--t3:#8a8480;--acc:#d4c9b4;--acc2:#a89880;--green:#5eb87a;--red:#e06060;--amber:#c8984a;--blue:#6a9fd8;--font:'SF Mono','Fira Mono','Courier New',monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--r:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);font-size:14px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 80px;}
a{color:var(--blue);text-decoration:none;}a:hover{text-decoration:underline;}
.wrap{width:100%;max-width:760px;padding:0 20px;}
header{padding:44px 20px 6px;width:100%;max-width:760px;display:flex;align-items:baseline;gap:10px;}
header h1{font-family:var(--font);font-size:15px;font-weight:400;letter-spacing:.12em;color:var(--acc);}
.pill{font-family:var(--font);font-size:9px;letter-spacing:.1em;color:var(--t3);border:1px solid var(--b2);padding:2px 7px;border-radius:3px;text-transform:uppercase;}
.sub{font-family:var(--font);font-size:11px;color:var(--t3);padding:0 20px;width:100%;max-width:760px;margin-bottom:28px;}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:14px;overflow:hidden;}
.card-head{padding:10px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:var(--font);font-size:9px;letter-spacing:.14em;color:var(--t3);text-transform:uppercase;}
.card-body{padding:18px;}
.row{display:flex;gap:10px;margin-bottom:14px;align-items:flex-end;}
.field{flex:1;display:flex;flex-direction:column;gap:5px;}
label{font-family:var(--font);font-size:9px;letter-spacing:.12em;color:var(--t3);text-transform:uppercase;}
input[type=text],select{background:var(--s2);border:1px solid var(--b1);border-radius:4px;padding:8px 12px;font-family:var(--font);font-size:12px;color:var(--t1);outline:none;width:100%;transition:border-color .15s;}
input:focus,select:focus{border-color:var(--b3);}
input::placeholder{color:var(--t3);}
select option{background:var(--s2);}
.btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--font);font-size:11px;letter-spacing:.06em;padding:8px 16px;border-radius:4px;border:1px solid var(--b2);background:transparent;color:var(--acc);cursor:pointer;transition:all .15s;text-transform:uppercase;}
.btn:hover{background:var(--s2);border-color:var(--b3);}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.btn-primary{background:var(--acc);color:#0c0c0c;border-color:var(--acc);}
.btn-primary:hover:not(:disabled){background:var(--acc2);border-color:var(--acc2);}
.btn-sm{padding:5px 11px;font-size:10px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--b3);flex-shrink:0;display:inline-block;}
.dot.green{background:var(--green);animation:pulse 2s infinite;}
.dot.red{background:var(--red);}
.dot.amber{background:var(--amber);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.tl-wrap{margin:4px 0 18px;padding:0 2px;}
.tl-track{position:relative;height:34px;cursor:pointer;user-select:none;}
.tl-bg{position:absolute;top:50%;transform:translateY(-50%);width:100%;height:3px;background:var(--b1);border-radius:2px;}
.tl-fill{position:absolute;top:50%;transform:translateY(-50%);height:3px;background:var(--acc2);border-radius:2px;pointer-events:none;}
.tl-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;background:var(--acc);border-radius:50%;cursor:grab;z-index:2;border:2px solid var(--bg);}
.tl-thumb:hover{transform:translate(-50%,-50%) scale(1.2);}
.tl-thumb.drag{cursor:grabbing;transform:translate(-50%,-50%) scale(1.25);}
.tl-edges{display:flex;justify-content:space-between;margin-top:6px;}
.tl-edge{font-family:var(--font);font-size:10px;color:var(--t3);}
.tl-sel{font-family:var(--font);font-size:11px;color:var(--acc2);text-align:center;margin-top:3px;}
.tl-ticks{position:absolute;top:50%;width:100%;pointer-events:none;}
.tick{position:absolute;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;}
.tick-line{width:1px;height:6px;background:var(--b2);margin-top:-3px;}
.tick-year{font-family:var(--font);font-size:8px;color:var(--t3);margin-top:1px;}
.prog-wrap{margin:10px 0 4px;display:none;}
.prog-outer{height:2px;background:var(--b1);border-radius:1px;overflow:hidden;}
.prog-inner{height:100%;background:var(--acc2);border-radius:1px;transition:width .3s;}
.prog-label{font-family:var(--font);font-size:10px;color:var(--t3);margin-top:4px;}
#preview{font-family:var(--font);font-size:11px;color:var(--t2);line-height:1.65;padding:18px;max-height:380px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;border-bottom:1px solid var(--b1);background:var(--bg);}
#preview::-webkit-scrollbar{width:3px;}
#preview::-webkit-scrollbar-track{background:transparent;}
#preview::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
.result-footer{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.result-meta{font-family:var(--font);font-size:10px;color:var(--t3);}
.result-meta em{color:var(--acc2);font-style:normal;}
.chip-input-wrap{background:var(--s2);border:1px solid var(--b1);border-radius:4px;padding:6px 8px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;cursor:text;min-height:36px;transition:border-color .15s;}
.chip-input-wrap:focus-within{border-color:var(--b3);}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:3px;font-family:var(--font);font-size:11px;border:1px solid;}
.chip.valid{border-color:var(--green);color:var(--green);background:rgba(94,184,122,.08);}
.chip.invalid{border-color:var(--red);color:var(--red);background:rgba(224,96,96,.08);}
.chip-x{cursor:pointer;opacity:.6;font-size:12px;line-height:1;margin-left:2px;}
.chip-x:hover{opacity:1;}
.chip-text-input{background:transparent;border:none;outline:none;font-family:var(--font);font-size:12px;color:var(--t1);min-width:120px;flex:1;padding:2px 4px;}
.chip-text-input::placeholder{color:var(--t3);}
.not-found-bar{font-family:var(--font);font-size:10px;color:var(--amber);padding:8px 18px;border-top:1px solid var(--b1);display:none;}
</style>
</head>
<body>
<header>
  <h1>MAIL EXTRACT</h1>
  <span class="pill">beta</span>
</header>
<p class="sub">extract emails as clean text &middot; feed to AI as context</p>

<div class="wrap">

  <!-- Account bar -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">account</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="dot green"></span>
        <span id="user-email" style="font-family:var(--font);font-size:11px;color:var(--t2);"></span>
        <button class="btn btn-sm" onclick="doLogout()">sign out</button>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">filters</span>
      <div style="display:flex;align-items:center;gap:6px;">
        <label style="margin:0;text-transform:none;letter-spacing:0;font-size:10px;">max</label>
        <input type="number" id="max-msgs" value="50" min="5" max="200" step="10"
          style="width:58px;background:var(--s2);border:1px solid var(--b1);border-radius:4px;padding:4px 6px;font-family:var(--font);font-size:11px;color:var(--green);text-align:center;outline:none;"
          oninput="updateMaxColor()">
      </div>
    </div>
    <div class="card-body">

      <!-- Chip display — full width, above inputs -->
      <div id="chip-display" style="display:none;flex-wrap:wrap;gap:5px;margin-bottom:10px;"></div>

      <!-- Row 1: folder toggle -->
      <div style="margin-bottom:10px;">
        <label style="display:block;margin-bottom:5px;">Folder</label>
        <div style="display:inline-flex;border:1px solid var(--b1);border-radius:4px;overflow:hidden;width:180px;">
          <button id="tog-inbox" onclick="setFolder('INBOX')"
            style="flex:1;font-family:var(--font);font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:8px 0;border:none;cursor:pointer;background:var(--s2);color:var(--t2);transition:background .15s,color .15s;">Inbox</button>
          <button id="tog-all" onclick="setFolder('[Gmail]/All Mail')"
            style="flex:1;font-family:var(--font);font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:8px 0;border:none;cursor:pointer;background:var(--acc);color:#0c0c0c;transition:background .15s,color .15s;">All Mail</button>
        </div>
      </div>

      <!-- Row 2: from | contains -->
      <div class="row" style="margin-bottom:4px;align-items:flex-end;">
        <div class="field">
          <label>From</label>
          <div style="display:flex;align-items:center;background:var(--s2);border:1px solid var(--b1);border-radius:4px;transition:border-color .15s;" id="from-wrap">
            <input type="text" id="chip-input" class="chip-text-input" placeholder="address, press Enter" style="padding:8px 12px;">
          </div>
        </div>
        <div class="field">
          <label>Contains</label>
          <input type="text" id="contains-query" placeholder="keywords">
        </div>
      </div>
      <div style="margin-bottom:14px;">
        <span onclick="resetSearch()" style="font-family:var(--font);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);cursor:pointer;transition:color .15s;"
          onmouseover="this.style.color='var(--acc2)'" onmouseout="this.style.color='var(--t3)'">reset</span>
      </div>

      <div class="tl-wrap">
        <div class="tl-track" id="tl-track">
          <div class="tl-bg"></div>
          <div class="tl-ticks" id="tl-ticks"></div>
          <div class="tl-fill" id="tl-fill"></div>
          <div class="tl-thumb" id="th-s"></div>
          <div class="tl-thumb" id="th-e"></div>
        </div>
        <div class="tl-edges">
          <span class="tl-edge" id="tl-min"></span>
          <span class="tl-sel" id="tl-sel"></span>
          <span class="tl-edge" id="tl-max"></span>
        </div>
      </div>

      <div class="prog-wrap" id="prog-wrap">
        <div class="prog-outer"><div class="prog-inner" id="prog-bar" style="width:0%"></div></div>
        <div class="prog-label" id="prog-label"></div>
      </div>

      <div class="row" style="margin-bottom:0;align-items:center;">
        <button class="btn btn-primary" id="fetch-btn" onclick="handleFetchBtn()">Extract emails</button>
        <span class="dot" id="fetch-dot"></span>
        <span id="fetch-status" style="font-family:var(--font);font-size:11px;"></span>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="card" id="results-card" style="display:none;">
    <div class="card-head"><span class="card-title">results</span></div>
    <pre id="preview"></pre>
    <div id="capped-bar" style="font-family:var(--font);font-size:10px;color:var(--green);padding:8px 18px;border-top:1px solid var(--b1);display:none;"></div>
    <div id="not-found-bar" class="not-found-bar"></div>
    <div class="result-footer">
      <div class="result-meta">
        <em id="r-count">0</em> emails &middot; <em id="r-chars">0</em> chars &middot; <em id="r-tokens">0</em> est. tokens
      </div>
      <button class="btn btn-sm btn-primary" onclick="copyAll(event)">copy all</button>
    </div>
  </div>

</div>

<div style="width:100%;display:flex;justify-content:center;padding:24px 20px 0;">
  <a href="https://emergence.designs-os.com/" target="_blank" rel="noopener" class="btn" style="text-decoration:none;white-space:nowrap;background:transparent;color:var(--acc);border-color:var(--b2);padding:10px 20px;border-radius:24px;font-family:var(--font);font-size:10px;letter-spacing:.08em;">💻 MEET THE TEAM</a>
</div>
<footer style="width:100%;max-width:760px;padding:16px 20px 0;display:flex;justify-content:center;align-items:center;gap:0;">
  <a href="https://aimail-extract.designs-os.com/legal" target="_blank" rel="noopener" style="font-family:var(--font);font-size:10px;color:var(--t3);text-decoration:none;letter-spacing:.08em;text-transform:uppercase;">Legal</a>
  <span style="font-family:var(--font);font-size:10px;color:var(--t3);">&nbsp; &nbsp;| &nbsp; </span>
  <a href="https://github.com/jedbjorn/Emergence_Project_Public" target="_blank" rel="noopener" style="font-family:var(--font);font-size:10px;color:var(--t3);text-decoration:none;">👾 Check out our Git</a>
</footer>

<script>
let fetchedMessages = [];
let fetchedMeta     = {};
let chips           = [];
let selectedFolder  = '[Gmail]/All Mail';
let fetching        = false;
let fetchController = null;

const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
function isValidEmail(v) { return EMAIL_RE.test(v.trim()); }

function updateMaxColor() {
  const el = document.getElementById('max-msgs');
  const v = parseInt(el.value) || 50;
  el.style.color = v <= 50 ? 'var(--green)' : v <= 100 ? 'var(--amber)' : 'var(--red)';
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch('/api/me');
    const d = await r.json();
    if (d.ok) {
      document.getElementById('user-email').textContent = d.email;
      fetchedMeta.email = d.email;
    }
  } catch (_) {}
  initTimeline();
  initChips();
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function doLogout() {
  try { await fetch('/logout', { method: 'POST' }); } catch (_) {}
  window.location.href = '/';
}

// ── FOLDER TOGGLE ─────────────────────────────────────────────────────────────
function setFolder(folder) {
  selectedFolder = folder;
  const inboxBtn = document.getElementById('tog-inbox');
  const allBtn   = document.getElementById('tog-all');
  if (folder === 'INBOX') {
    inboxBtn.style.background = 'var(--acc)';  inboxBtn.style.color = '#0c0c0c';
    allBtn.style.background   = 'var(--s2)';   allBtn.style.color   = 'var(--t2)';
  } else {
    allBtn.style.background   = 'var(--acc)';  allBtn.style.color   = '#0c0c0c';
    inboxBtn.style.background = 'var(--s2)';   inboxBtn.style.color = 'var(--t2)';
  }
}

// ── CHIP INPUT ────────────────────────────────────────────────────────────────
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderChips() {
  const display = document.getElementById('chip-display');
  display.querySelectorAll('.chip').forEach(c => c.remove());
  chips.forEach((chip, i) => {
    const el = document.createElement('span');
    el.className = 'chip ' + (chip.valid ? 'valid' : 'invalid');
    el.innerHTML = escapeHtml(chip.value) + '<span class="chip-x" onclick="removeChip(' + i + ')">&#x2715;</span>';
    display.appendChild(el);
  });
  display.style.display = chips.length ? 'flex' : 'none';
}

function addChip(value) {
  const parts = value.split(',');
  for (const part of parts) {
    const angle = part.match(/<([^>]+)>/);
    const v = (angle ? angle[1] : part).trim().replace(/^[<>\s]+|[<>\s]+$/g, '');
    if (!v) continue;
    if (!chips.some(c => c.value === v)) {
      chips.push({ value: v, valid: isValidEmail(v) });
    }
  }
  renderChips();
  document.getElementById('chip-input').value = '';
}

function removeChip(i) {
  chips.splice(i, 1);
  renderChips();
}

function hasInvalidChips() {
  return chips.some(c => !c.valid);
}

function initChips() {
  const input   = document.getElementById('chip-input');
  const fromWrap = document.getElementById('from-wrap');
  fromWrap.addEventListener('click', () => input.focus());
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      addChip(input.value);
    } else if (e.key === 'Backspace' && input.value === '' && chips.length) {
      chips.pop();
      renderChips();
    }
  });
  input.addEventListener('blur', () => {
    if (input.value.trim()) addChip(input.value);
  });
  input.addEventListener('focus', () => fromWrap.style.borderColor = 'var(--b3)');
  input.addEventListener('blur',  () => fromWrap.style.borderColor = 'var(--b1)');
}

function resetSearch() {
  chips = [];
  renderChips();
  document.getElementById('chip-input').value    = '';
  document.getElementById('contains-query').value = '';
}

// ── TIMELINE ──────────────────────────────────────────────────────────────────
const TL_MONTHS = 24;
const tlEnd   = new Date();
const tlStart = new Date(); tlStart.setMonth(tlStart.getMonth() - TL_MONTHS);
let sP = 0, eP = 1, drag = null;

function pToDate(p) {
  const d = new Date(tlStart);
  d.setDate(d.getDate() + Math.round(p * TL_MONTHS * 30.44));
  return d;
}
function fmt(d)     { return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' }); }
function fmtFull(d) { return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }); }
function toISO(d)   { return d.toISOString().slice(0, 10); }

function initTimeline() {
  document.getElementById('tl-min').textContent = fmt(tlStart);
  document.getElementById('tl-max').textContent = fmt(tlEnd);
  const ticks = document.getElementById('tl-ticks');
  ticks.innerHTML = '';
  for (let i = 0; i <= TL_MONTHS; i++) {
    const d = new Date(tlStart); d.setMonth(d.getMonth() + i);
    if (d.getMonth() === 0) {
      const t = document.createElement('div');
      t.className = 'tick'; t.style.left = (i / TL_MONTHS * 100) + '%';
      t.innerHTML = '<div class="tick-line" style="height:10px;background:var(--b3)"></div><span class="tick-year">' + d.getFullYear() + '</span>';
      ticks.appendChild(t);
    } else if (i % 3 === 0) {
      const t = document.createElement('div');
      t.className = 'tick'; t.style.left = (i / TL_MONTHS * 100) + '%';
      t.innerHTML = '<div class="tick-line"></div>';
      ticks.appendChild(t);
    }
  }
  renderTL();
  const track = document.getElementById('tl-track');
  track.addEventListener('mousedown', tlDown);
  track.addEventListener('touchstart', tlDown, { passive: true });
  document.addEventListener('mousemove', tlMove);
  document.addEventListener('mouseup', tlUp);
  document.addEventListener('touchmove', tlMove, { passive: false });
  document.addEventListener('touchend', tlUp);
}

function renderTL() {
  document.getElementById('th-s').style.left    = (sP * 100) + '%';
  document.getElementById('th-e').style.left    = (eP * 100) + '%';
  document.getElementById('tl-fill').style.left  = (sP * 100) + '%';
  document.getElementById('tl-fill').style.width = ((eP - sP) * 100) + '%';
  document.getElementById('tl-sel').textContent  = fmtFull(pToDate(sP)) + '  \u2192  ' + fmtFull(pToDate(eP));
}
function tlPct(e) {
  const r = document.getElementById('tl-track').getBoundingClientRect();
  return Math.max(0, Math.min(1, ((e.touches ? e.touches[0].clientX : e.clientX) - r.left) / r.width));
}
function tlDown(e) {
  const r  = document.getElementById('tl-track').getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const ds = Math.abs(cx - (r.left + sP * r.width));
  const de = Math.abs(cx - (r.left + eP * r.width));
  if (ds < 22 || de < 22) {
    drag = ds <= de ? 's' : 'e';
    e.preventDefault && e.preventDefault();
    document.getElementById(drag === 's' ? 'th-s' : 'th-e').classList.add('drag');
  }
}
function tlMove(e) {
  if (!drag) return;
  if (e.cancelable) e.preventDefault();
  const p = tlPct(e);
  if (drag === 's') sP = Math.min(p, eP - 0.03);
  else              eP = Math.max(p, sP + 0.03);
  renderTL();
}
function tlUp() {
  if (drag) { document.getElementById(drag === 's' ? 'th-s' : 'th-e').classList.remove('drag'); drag = null; }
}

// ── FETCH ─────────────────────────────────────────────────────────────────────
function handleFetchBtn() {
  if (fetching) { cancelFetch(); return; }
  doFetch();
}

function setFetchBtn(mode) {
  const btn = document.getElementById('fetch-btn');
  if (mode === 'cancel') {
    btn.textContent = 'Cancel';
    btn.classList.remove('btn-primary');
    btn.style.background = 'var(--red)';
    btn.style.borderColor = 'var(--red)';
    btn.style.color = '#fff';
    btn.disabled = false;
  } else {
    btn.textContent = 'Extract emails';
    btn.classList.add('btn-primary');
    btn.style.background = '';
    btn.style.borderColor = '';
    btn.style.color = '';
    btn.disabled = false;
  }
}

function cancelFetch() {
  if (fetchController) fetchController.abort();
}

async function doFetch() {
  if (fetching) return;

  const chipInput = document.getElementById('chip-input');
  if (chipInput.value.trim()) addChip(chipInput.value);

  if (hasInvalidChips()) {
    setStatus('fix invalid addresses', 'red');
    return;
  }

  fetching = true;
  fetchController = new AbortController();
  const fromAddresses = chips.map(c => c.value);
  const contains      = document.getElementById('contains-query').value.trim();
  const folder        = selectedFolder;
  const d1 = pToDate(sP), d2 = pToDate(eP);

  setStatus('searching\u2026', 'amber');
  setFetchBtn('cancel');
  document.getElementById('results-card').style.display = 'none';
  document.getElementById('not-found-bar').style.display = 'none';
  document.getElementById('capped-bar').style.display = 'none';
  showProg(5, 'contacting server\u2026');

  const prog = setInterval(() => {
    const bar = document.getElementById('prog-bar');
    const cur = parseInt(bar.style.width) || 5;
    if (cur < 85) bar.style.width = Math.min(cur + 3, 85) + '%';
  }, 400);

  try {
    const r = await fetch('/api/fetch', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ folder, fromAddresses, contains, dateFrom: toISO(d1), dateTo: toISO(d2), maxMessages: parseInt(document.getElementById('max-msgs').value) || 50 }),
      signal: fetchController.signal,
    });
    const d = await r.json();
    clearInterval(prog);

    if (d.ok) {
      fetchedMessages   = d.messages;
      fetchedMeta.query = fromAddresses.length ? 'from:' + fromAddresses.join(', ') : '(all)';
      fetchedMeta.range = fmt(d1) + ' \u2192 ' + fmt(d2);
      showProg(100, 'done');
      setTimeout(hideProg, 600);
      showResults(d.messages, d.notFound || [], d.capped);

      const found = d.messages.length;
      const nf    = d.notFound || [];
      if (nf.length === 0 && found === 0) {
        setStatus(d.hint || 'No messages found for the selected criteria.', 'amber');
      } else if (nf.length === 0) {
        setStatus(found + ' found, more may exist. Adjust counter or time frame as needed.', 'green');
      } else if (found > 0) {
        setStatus(found + ' found · ' + nf.map(a => a + ' not found').join(' · '), 'amber');
      } else {
        setStatus(d.hint || nf.map(a => a + ' not found').join(' · '), 'red');
      }
    } else {
      hideProg();
      setStatus('error: ' + (d.error || 'unknown'), 'red');
    }
  } catch (e) {
    clearInterval(prog);
    hideProg();
    if (e.name === 'AbortError') {
      setStatus('cancelled', 'amber');
    } else {
      setStatus('failed: ' + e.message, 'red');
    }
  }

  fetching = false;
  fetchController = null;
  setFetchBtn('extract');
}

// ── RESULTS ───────────────────────────────────────────────────────────────────
function showResults(msgs, notFound, capped) {
  document.getElementById('results-card').style.display = 'block';

  const cappedBar = document.getElementById('capped-bar');
  if (capped) {
    cappedBar.textContent = 'More emails found than displayed here.';
    cappedBar.style.display = 'block';
  } else {
    cappedBar.style.display = 'none';
  }

  const nfBar = document.getElementById('not-found-bar');
  if (notFound.length) {
    nfBar.textContent   = notFound.map(a => 'No emails found from: ' + a).join(' · ');
    nfBar.style.display = 'block';
  } else {
    nfBar.style.display = 'none';
  }

  if (!msgs.length) {
    document.getElementById('preview').textContent = '(no results)';
    document.getElementById('r-count').textContent  = '0';
    document.getElementById('r-chars').textContent  = '0';
    document.getElementById('r-tokens').textContent = '0';
    return;
  }

  const text = msgs.slice(0, 8).map((m, i) => [
    '\u2500\u2500\u2500 MESSAGE ' + String(i + 1).padStart(3, '0'),
    'Date:    ' + m.date,
    'From:    ' + m.from,
    'Subject: ' + m.subject,
    m.body ? '\n' + (m.body.slice(0, 300) + (m.body.length > 300 ? '\u2026' : '')) : '',
    ''
  ].join('\n')).join('\n');
  document.getElementById('preview').textContent = text + (msgs.length > 8 ? '\n\n\u2026 and ' + (msgs.length - 8) + ' more (all included in copy)' : '');
  const totalChars = msgs.reduce((a, m) => a + (m.from.length + m.subject.length + (m.body || '').length), 0);
  document.getElementById('r-count').textContent  = msgs.length;
  document.getElementById('r-chars').textContent  = totalChars.toLocaleString();
  document.getElementById('r-tokens').textContent = Math.round(totalChars / 4).toLocaleString();
}

function copyAll(event) {
  const sep   = '\u2550'.repeat(63);
  const lines = [
    sep,
    'MAIL EXTRACT \u2014 ' + new Date().toISOString().slice(0, 19),
    'account: ' + (fetchedMeta.email || ''),
    'query: '   + (fetchedMeta.query || '(all)'),
    'range: '   + (fetchedMeta.range || ''),
    sep, ''
  ];
  fetchedMessages.forEach((m, i) => {
    lines.push('\u2500\u2500\u2500 MESSAGE ' + String(i + 1).padStart(3, '0') + ' ' + '\u2500'.repeat(44));
    lines.push('Date:    ' + m.date, 'From:    ' + m.from, 'Subject: ' + m.subject);
    if (m.body) lines.push('', m.body);
    lines.push('');
  });
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btn = event.target;
    btn.textContent = 'copied!';
    setTimeout(() => btn.textContent = 'copy all', 1500);
  });
}

// ── STATUS / PROGRESS ─────────────────────────────────────────────────────────
function setStatus(msg, dot) {
  const el = document.getElementById('fetch-status');
  el.textContent = msg;
  el.style.color = dot === 'green' ? 'var(--green)'
                 : dot === 'amber' ? 'var(--amber)'
                 : dot === 'red'   ? 'var(--red)'
                 : 'var(--t2)';
  const d = document.getElementById('fetch-dot');
  d.className = 'dot' + (dot ? ' ' + dot : '');
}
function showProg(pct, label) {
  document.getElementById('prog-wrap').style.display = 'block';
  document.getElementById('prog-bar').style.width    = pct + '%';
  document.getElementById('prog-label').textContent  = label;
}
function hideProg() { document.getElementById('prog-wrap').style.display = 'none'; }

init();
</script>
